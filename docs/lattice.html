<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Generative Lattice — Prototype</title>
<style>
  :root {
    --bg: #14161a;
    --panel: #1c1f26;
    --panel-border: #2c3038;
    --text: #e8e9ec;
    --text-dim: #9aa0ab;
    --accent: #5eb4ff;
    --accent-2: #ff9a5e;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }
  #app { display: flex; flex-direction: column; height: 100%; }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--panel-border);
    display: flex; align-items: baseline; gap: 14px; flex-shrink: 0;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; letter-spacing: 0.2px; }
  header p { margin: 0; font-size: 12.5px; color: var(--text-dim); }
  header nav { margin-left: auto; font-size: 12px; }
  header nav a { color: var(--text-dim); text-decoration: none; }
  header nav a:hover { color: var(--text); }
  header nav a.active { color: var(--accent); }
  main { flex: 1; display: flex; min-height: 0; position: relative; }
  #viewport-wrap { flex: 1; min-height: 0; position: relative; }
  #viewport-wrap canvas { display: block; }
  .pane-label {
    position: absolute; top: 10px; left: 14px;
    font-size: 11px; text-transform: uppercase; letter-spacing: 0.8px;
    color: var(--text-dim); z-index: 2; pointer-events: none;
  }
  #stats {
    position: absolute; bottom: 10px; left: 14px;
    font-size: 11px; color: var(--text-dim);
    z-index: 2; line-height: 1.5; white-space: pre-line; pointer-events: none;
  }
  #status {
    position: absolute; top: 10px; right: 14px;
    font-size: 11px; color: var(--accent-2);
    z-index: 2; pointer-events: none;
  }
  #controls {
    flex-shrink: 0;
    border-top: 1px solid var(--panel-border);
    background: var(--panel);
    padding: 12px 16px;
    display: flex; flex-wrap: wrap; gap: 18px; align-items: center;
  }
  .control { display: flex; flex-direction: column; gap: 4px; min-width: 90px; }
  .control label {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: 0.6px;
    color: var(--text-dim);
  }
  input[type="number"] {
    width: 64px; background: #11131700;
    border: 1px solid var(--panel-border); color: var(--text);
    border-radius: 4px; padding: 4px 6px; font-size: 12px;
  }
  select {
    background: #262a33; border: 1px solid var(--panel-border);
    color: var(--text); border-radius: 4px; padding: 4px 6px; font-size: 12px;
  }
  button {
    background: #262a33; border: 1px solid var(--panel-border);
    color: var(--text); padding: 7px 14px; border-radius: 6px;
    font-size: 12px; cursor: pointer;
  }
  button:hover { background: #2f333e; border-color: #444a56; }
  button.primary {
    background: var(--accent); color: #0c1420;
    border-color: var(--accent); font-weight: 600;
  }
  button.primary:hover { filter: brightness(1.08); }
  button:disabled { opacity: 0.45; cursor: default; }
  button.on {
    background: var(--accent-2); color: #0c1420;
    border-color: var(--accent-2); font-weight: 600;
  }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Generative Lattice</h1>
    <p>Prototype — gyroid / Schwarz / diamond lattices in parametric shapes or imported STL/3MF parts. Watertight solids ready to slice.</p>
    <nav>
      <a href="index.html">Home</a> ·
      <a href="vase.html">Vase Designer</a> ·
      <a href="texture.html">Mesh Texturizer</a> ·
      <a href="terrain.html">Terrain Maker</a> ·
      <a href="lattice.html" class="active">Lattice</a>
    </nav>
  </header>
  <main>
    <div id="viewport-wrap">
      <div class="pane-label">3D View (drop an STL/3MF to lattice-fill it)</div>
      <div id="stats"></div>
      <div id="status"></div>
    </div>
  </main>
  <div id="controls">
    <button id="importBtn">Import STL/3MF</button>
    <input type="file" id="importInput" accept=".stl,.3mf" style="display:none" />
    <div class="control">
      <label>Shape</label>
      <select id="shapeSelect">
        <option value="box" selected>Box</option>
        <option value="cylinder">Cylinder</option>
        <option value="sphere">Sphere</option>
        <option value="imported" disabled>Imported part</option>
      </select>
    </div>
    <div class="control" id="widthControl">
      <label>Width (mm)</label>
      <input type="number" id="widthInput" min="10" max="250" step="1" value="60" />
    </div>
    <div class="control" id="depthControl">
      <label>Depth (mm)</label>
      <input type="number" id="depthInput" min="10" max="250" step="1" value="60" />
    </div>
    <div class="control" id="diameterControl" style="display:none">
      <label>Diameter (mm)</label>
      <input type="number" id="diameterInput" min="10" max="250" step="1" value="50" />
    </div>
    <div class="control" id="heightControl">
      <label>Height (mm)</label>
      <input type="number" id="heightInput" min="5" max="250" step="1" value="30" />
    </div>
    <div class="control">
      <label>Lattice</label>
      <select id="latticeSelect">
        <option value="gyroid" selected>Gyroid</option>
        <option value="schwarz">Schwarz P</option>
        <option value="diamond">Diamond</option>
        <option value="none">None (solid/hollow)</option>
      </select>
    </div>
    <div class="control">
      <label>Cell size (mm)</label>
      <input type="number" id="cellInput" min="3" max="40" step="0.5" value="10" />
    </div>
    <div class="control">
      <label>Wall (mm)</label>
      <input type="number" id="wallInput" min="0.4" max="6" step="0.1" value="1.2" />
    </div>
    <div class="control">
      <label>Shell (mm, 0=open)</label>
      <input type="number" id="shellInput" min="0" max="6" step="0.1" value="1.2" />
    </div>
    <div class="control">
      <label>Caps (mm, 0=off)</label>
      <input type="number" id="capInput" min="0" max="6" step="0.1" value="1" />
    </div>
    <div class="control">
      <label>Voxel (mm)</label>
      <input type="number" id="voxelInput" min="0.3" max="2" step="0.1" value="0.7" />
    </div>
    <div class="controls-break"></div>
    <div class="control">
      <label>Max wall (mm)</label>
      <input type="number" id="wallMaxInput" min="0.4" max="8" step="0.1" value="2.4" />
    </div>
    <div class="control">
      <label>Surface bias</label>
      <input type="range" id="surfaceBiasSlider" min="0" max="1" step="0.05" value="0" />
      <span class="value" id="surfaceBiasValue">off</span>
    </div>
    <div class="control">
      <label>Bias depth (mm)</label>
      <input type="number" id="biasDepthInput" min="1" max="30" step="0.5" value="6" />
    </div>
    <div class="control">
      <label>Vertical gradient</label>
      <input type="range" id="zGradientSlider" min="-1" max="1" step="0.05" value="0" />
      <span class="value" id="zGradientValue">off</span>
    </div>
    <button id="emphasisBtn" title="Click the part to place density attractors">Add emphasis points</button>
    <div class="control">
      <label>Point radius (mm)</label>
      <input type="number" id="emphasisRadiusInput" min="2" max="60" step="1" value="12" />
    </div>
    <button id="clearEmphasisBtn" disabled>Clear points (0)</button>
    <button id="generateBtn" class="primary">Generate</button>
    <button id="exportStlBtn" disabled>Export STL</button>
    <button id="export3mfBtn" disabled>Export 3MF</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.6/build/index.module.js",
    "fflate": "https://unpkg.com/fflate@0.8.2/esm/browser.js"
  }
}
</script>
<script type="module" src="js/lattice/app.js"></script>
</body>
</html>
